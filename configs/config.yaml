# ============================================================================
# Polymarket Trading Bot - Master Configuration
# ============================================================================
# All parameters are configurable. No hardcoded values in the codebase.
# Copy this file and modify for different strategies/backtests.
# ============================================================================

# --- API & Authentication ---
api:
  # Polymarket CLOB API endpoint
  clob_url: "https://clob.polymarket.com"
  # Gamma API for market metadata
  gamma_url: "https://gamma-api.polymarket.com"
  # The Graph subgraph endpoint for historical data
  subgraph_url: "https://api.thegraph.com/subgraphs/name/polymarket/polymarket-matic"
  # Polling interval in seconds for the main scan loop
  scan_interval_seconds: 5
  # Rate limit: max requests per second to CLOB API
  max_requests_per_second: 5
  # Retry configuration
  max_retries: 3
  retry_backoff_base: 2.0  # Exponential backoff base (seconds)

# --- On-Chain Enrichment (FREE, no API key needed) ---
# Derives smart money, whale flow, and sentiment signals from
# Polymarket's own public data (CLOB trades, Gamma API, cross-market analysis).
# This replaces the paid Unusual Whales API with free alternatives.
onchain:
  # Enabled by default since it's completely free
  enabled: true
  # Rate limit for enrichment API calls
  max_requests_per_second: 3
  # How long to cache responses (seconds)
  cache_ttl_seconds: 120
  # Enrich every scanned market each cycle (slower but comprehensive)
  enrich_all_markets: false
  # Only enrich markets that already pass initial edge detection (faster)
  # Two-pass: detect edge with core signals, then enrich+refine with on-chain data
  enrich_on_edge_only: true
  # Minimum trades needed for reliable whale/smart money analysis
  min_trades_for_analysis: 20

# --- Wallet / Chain ---
wallet:
  # Private key loaded from .env (POLYMARKET_PRIVATE_KEY)
  # Chain ID for Polygon
  chain_id: 137
  # Approval proxy for Polymarket's CLOB
  approval_amount: "1000000000"  # 1B USDC units (6 decimals)

# --- Trading Parameters ---
trading:
  # Minimum edge (estimated_prob - market_price) to trigger a trade
  min_edge_threshold: 0.02  # 2% (aggressive - catches more opportunities)
  # Maximum edge — reject outliers that may indicate bad data
  max_edge_threshold: 0.40  # 40%
  # Position sizing method: "kelly" or "fixed_fractional"
  position_sizing_method: "fixed_fractional"  # optimized via sweep
  # Fixed fractional: fraction of bankroll per trade (used if method=fixed_fractional)
  fixed_fraction: 0.15  # 15% of bankroll (aggressive)
  # Kelly fraction multiplier (use half-Kelly for safety)
  kelly_fraction: 0.5
  # Maximum position size in USDC per single trade
  max_position_size_usd: 10.0
  # Minimum position size in USDC (below this, skip the trade)
  min_position_size_usd: 1.0
  # Maximum total portfolio exposure in USDC across all open positions
  max_portfolio_exposure_usd: 500.0
  # Stop-loss threshold: close position if unrealized loss exceeds this fraction
  stop_loss_threshold: 0.25  # 25% loss triggers stop-loss (more room during volatile games)
  # Take-profit threshold: close position when price converges within this of fair value
  take_profit_threshold: 0.05  # Within 5% of estimated fair value (lets winners run)
  # Daily loss limit in USDC — halt all trading when breached
  daily_loss_limit_usd: 200.0
  # Maximum number of concurrent open positions
  max_open_positions: 20
  # Paper trading mode (no real orders submitted)
  paper_trading: false

# --- Signal Weights ---
# Weights for combining signals into a probability estimate.
# Must sum to 1.0. Set a weight to 0 to disable that signal.
signals:
  # --- Core signals (work without any external API) ---
  price_momentum_weight: 0.20
  volume_signal_weight: 0.15
  order_book_imbalance_weight: 0.25
  mean_reversion_weight: 0.10
  volatility_signal_weight: 0.05
  # --- Unusual Whales signals (require UW API key) ---
  # When UW is disabled, set these to 0 and redistribute to core signals above.
  # When UW is enabled, these add smart money/whale/sentiment data.
  uw_smart_money_weight: 0.10     # Prediction market smart money positioning
  uw_whale_flow_weight: 0.10      # Whale accumulation and unusual activity
  uw_market_sentiment_weight: 0.05 # Macro market tide from options flow
  # Lookback windows (number of data points)
  momentum_lookback: 20
  volume_lookback: 10
  volatility_lookback: 30
  # Mean reversion parameters
  mean_reversion_window: 50
  mean_reversion_z_threshold: 1.5

# --- Market Filters ---
filters:
  # Minimum daily volume (USDC) for a market to be considered
  min_daily_volume_usd: 500.0
  # Minimum liquidity depth (USDC within 5% of mid) for a market
  min_liquidity_usd: 200.0
  # Only trade markets expiring at least this many hours in the future
  min_hours_to_expiry: 1
  # Skip markets resolving more than this many hours from now (focus on short-term)
  max_hours_to_expiry: 48
  # Skip markets with fewer than this many historical price points
  min_price_history_length: 10
  # Market categories to include (empty list = all categories)
  include_categories: []
  # Market categories to exclude
  exclude_categories: []

# --- Backtesting ---
backtest:
  # Path to historical data directory
  data_dir: "./data/historical"
  # Date range for backtest (ISO format)
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  # Starting bankroll for backtest
  initial_bankroll_usd: 200.0
  # Slippage model: "fixed" or "depth_based"
  slippage_model: "depth_based"
  # Fixed slippage in basis points (used if model=fixed)
  fixed_slippage_bps: 50  # 0.5%
  # Depth-based slippage multiplier (higher = more slippage for thin books)
  depth_slippage_multiplier: 0.001
  # Polymarket fee structure
  maker_fee_bps: 0    # Makers pay 0 on Polymarket
  taker_fee_bps: 200  # Takers pay ~2%
  # Simulated latency in milliseconds
  latency_ms: 500
  # Benchmark targets
  benchmark_win_rate: 0.62
  benchmark_trade_count: 366

# --- Parameter Sweep (Sensitivity Analysis) ---
sweep:
  # Edge thresholds to test
  edge_thresholds: [0.03, 0.05, 0.07, 0.10, 0.15]
  # Position sizing methods to test
  sizing_methods: ["kelly", "fixed_fractional"]
  # Kelly fractions to test (only applies when method=kelly)
  kelly_fractions: [0.25, 0.5, 0.75, 1.0]
  # Fixed fractions to test (only applies when method=fixed_fractional)
  fixed_fractions: [0.01, 0.02, 0.05, 0.10]
  # Stop-loss levels to test
  stop_loss_levels: [0.05, 0.10, 0.15, 0.20, 0.30]
  # Number of parallel workers for sweep
  max_workers: 4

# --- Logging ---
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  # Log file path (relative to project root)
  file: "./reports/trading.log"
  # Also log to stdout
  console: true
  # Log every scan cycle (verbose — set to false in production)
  log_scans: true
  # Log full order book snapshots (very verbose)
  log_order_books: false

# --- Reporting ---
reporting:
  # Output directory for backtest reports
  output_dir: "./reports"
  # Chart format: "png" or "html" (html uses plotly)
  chart_format: "png"
  # Export results as JSON alongside charts
  export_json: true
  # Export results as CSV
  export_csv: true

# --- Alerts ---
alerts:
  enabled: true
  # Slack webhook URL (loaded from .env SLACK_WEBHOOK_URL)
  slack_webhook_url: ""
  # Which events trigger alerts
  on_trade_open: true
  on_trade_close: true
  on_daily_summary: true
  # Hour (UTC) to send daily summary (22 = 10 PM UTC / ~6 PM ET)
  daily_summary_hour: 22
  on_error: true

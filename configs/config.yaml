api:
  clob_url: https://clob.polymarket.com
  gamma_url: https://gamma-api.polymarket.com
  subgraph_url: https://api.thegraph.com/subgraphs/name/polymarket/polymarket-matic
  scan_interval_seconds: 5
  max_requests_per_second: 5
  max_retries: 3
  retry_backoff_base: 2.0
onchain:
  enabled: true
  max_requests_per_second: 3
  cache_ttl_seconds: 120
  enrich_all_markets: false
  enrich_on_edge_only: true
  min_trades_for_analysis: 20
wallet:
  chain_id: 137
  approval_amount: '1000000000'
trading:
  min_edge_threshold: 0.065
  max_edge_threshold: 0.4
  position_sizing_method: tiered_kelly
  fixed_fraction: 0.15
  kelly_fraction: 0.5
  max_position_size_usd: 3.12
  max_daily_trades: 15
  min_position_size_usd: 5.0
  max_portfolio_exposure_usd: 500.0
  stop_loss_threshold: 0.25
  take_profit_threshold: 0.05
  minimum_take_profit_usd: 5.0
  aggressive_exit_pct: 0.3
  trailing_stop_activation_pct: 0.15
  trailing_stop_pct: 0.1
  daily_loss_limit_usd: 200.0
  max_open_positions: 5
  paper_trading: false
signals:
  odds_value_weight: 0.4
  sports_context_weight: 0.15
  line_movement_weight: 0.2
  order_book_imbalance_weight: 0.15
  liquidity_imbalance_weight: 0.1
filters:
  min_daily_volume_usd: 500.0
  min_liquidity_usd: 200.0
  min_hours_to_expiry: 1
  max_hours_to_expiry: 48
  min_price_history_length: 10
  include_categories: []
  exclude_categories: []
backtest:
  data_dir: ./data/historical
  start_date: '2024-01-01'
  end_date: '2024-12-31'
  initial_bankroll_usd: 200.0
  slippage_model: depth_based
  fixed_slippage_bps: 50
  depth_slippage_multiplier: 0.001
  maker_fee_bps: 0
  taker_fee_bps: 200
  latency_ms: 500
  benchmark_win_rate: 0.62
  benchmark_trade_count: 366
sweep:
  edge_thresholds:
  - 0.03
  - 0.05
  - 0.07
  - 0.1
  - 0.15
  sizing_methods:
  - kelly
  - fixed_fractional
  kelly_fractions:
  - 0.25
  - 0.5
  - 0.75
  - 1.0
  fixed_fractions:
  - 0.01
  - 0.02
  - 0.05
  - 0.1
  stop_loss_levels:
  - 0.05
  - 0.1
  - 0.15
  - 0.2
  - 0.3
  max_workers: 4
logging:
  level: INFO
  file: ./reports/trading.log
  console: true
  log_scans: true
  log_order_books: false
reporting:
  output_dir: ./reports
  chart_format: png
  export_json: true
  export_csv: true
alerts:
  enabled: true
  slack_webhook_url: ''
  on_trade_open: true
  on_trade_close: true
  on_daily_summary: true
  daily_summary_hour: 22
  on_error: true
